name: Daily post (auto cadence)

# The hands-off newsroom. Three runs a day, each posting one time SLOT:
#   13:00 UTC (g1)         â€” golf Group-1 reel
#   16:00 UTC (main)       â€” golf Group-2 reel + soccer match reel
#   19:00 UTC (companions) â€” carousels/photos (results, previews, tables,
#                            playoffs/finals/champions) + cursor advance + (on a
#                            champions day) the season-transition selection.
# Content + the correct SEASON are reconstructed from the cursor in state.json
# (automation-state branch); see src/headless/dailyCalendar.ts + seasonReconstruct.ts.
# Reuses the render â†’ finalize â†’ host(orphan) â†’ post spine of content-post.yml.
#
# SAFETY: scheduled runs post only when state.json `enabled` is true (the one-switch
# pause). Manual runs offer dry-run (generate + host, NO post) to eyeball a slot.

on:
  schedule:
    - cron: '0 13 * * *' # g1: golf Group 1
    - cron: '0 16 * * *' # main: golf Group 2 + soccer match
    - cron: '0 19 * * *' # companions: carousels/photos + advance
  workflow_dispatch:
    inputs:
      mode:
        description: 'dry-run = generate + host, do NOT post or advance. live = post (+ advance on the companions slot).'
        type: choice
        options: [dry-run, live]
        default: dry-run
      slot:
        description: 'Which slot to render/post.'
        type: choice
        options: [g1, main, companions]
        default: companions
      catchup:
        description: 'One-off: render the S1 seed-drop gap posts (soccer R1 table, golf E1 results, E2 preview). Cursor not advanced.'
        type: boolean
        default: false
      force:
        description: 'Bypass the "already ran this slot today" guard (use only to re-run a failed slot on purpose).'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read cadence state
        id: state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/cadence-state.mjs read

      - name: Plan run
        id: plan
        run: |
          EVENT="${{ github.event_name }}"
          MODE="${{ github.event.inputs.mode }}"
          ENABLED="${{ steps.state.outputs.enabled }}"
          # Map the firing cron to a slot; dispatch uses the chosen slot input.
          case "${{ github.event.schedule }}" in
            "0 13 * * *") SLOT=g1 ;;
            "0 16 * * *") SLOT=main ;;
            "0 19 * * *") SLOT=companions ;;
            *) SLOT="${{ github.event.inputs.slot }}" ;;
          esac
          [ -z "$SLOT" ] && SLOT=companions
          TODAY=$(date -u +%F)
          # Which real date did this slot last run? (idempotency: at most once/day)
          case "$SLOT" in
            g1) LASTRUN="${{ steps.state.outputs.lr_g1 }}" ;;
            main) LASTRUN="${{ steps.state.outputs.lr_main }}" ;;
            companions) LASTRUN="${{ steps.state.outputs.lr_companions }}" ;;
          esac
          FORCE="${{ github.event.inputs.force }}"
          RUN=false; POST=false
          if [ "$EVENT" = "schedule" ]; then
            MODE=live
            if [ "$ENABLED" != "true" ]; then echo "âŹ¸ cadence paused (enabled=false) â€” skipping."
            elif [ "$LASTRUN" = "$TODAY" ] && [ "$FORCE" != "true" ]; then echo "âŹ­ slot $SLOT already ran $TODAY â€” skipping (idempotent)."
            else RUN=true; POST=true; fi
          else
            # Manual dispatch: dry-run always runs; a live re-fire honours the date
            # guard unless force=true (so a re-fired companions can't double-post).
            if [ "$MODE" = "live" ] && [ "$LASTRUN" = "$TODAY" ] && [ "$FORCE" != "true" ]; then
              echo "âŹ­ slot $SLOT already posted $TODAY â€” pass force=true to override."
            else
              RUN=true
              [ "$MODE" = "live" ] && POST=true
            fi
          fi
          echo "run=$RUN" >> "$GITHUB_OUTPUT"
          echo "post=$POST" >> "$GITHUB_OUTPUT"
          echo "slot=$SLOT" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "today=$TODAY" >> "$GITHUB_OUTPUT"
          echo "plan: event=$EVENT slot=$SLOT mode=$MODE enabled=$ENABLED lastRun=$LASTRUN today=$TODAY â†’ run=$RUN post=$POST"

      - name: Install deps + Chromium + ffmpeg
        if: steps.plan.outputs.run == 'true'
        run: |
          npm ci
          npm i -D playwright
          npx playwright install --with-deps chromium
          sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Generate this slot's content
        if: steps.plan.outputs.run == 'true'
        run: |
          STATE=$(echo "${{ steps.state.outputs.state_b64 }}" | base64 -d)
          node scripts/daily-content.mjs content-out "$STATE" "${{ steps.plan.outputs.slot }}" "${{ steps.plan.outputs.mode }}" ${{ github.event.inputs.catchup == 'true' && 'catchup' || '' }}

      - name: Finalize reels (mux audio + scoreboard end-card)
        if: steps.plan.outputs.run == 'true'
        run: |
          node scripts/finalize-reels.mjs content-out
          ls -la content-out

      - name: Host assets (force-push to orphan content-host branch)
        id: host
        if: steps.plan.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan content-host
          git reset -q
          git add -f content-out
          git commit -q -m "daily content [skip ci]"
          git push -f origin content-host
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # CLAIM the slot BEFORE posting: persist the advanced cursor + stamp
      # lastRun[slot]=today. If the post below then fails, the slot is DROPPED
      # (recoverable next day) rather than DUPLICATED on a retry. The generator
      # encodes the advance logic (HWM bump per slot; companions advances the day /
      # runs the season transition).
      - name: Advance / mark cadence cursor
        if: steps.plan.outputs.post == 'true' && github.event.inputs.catchup != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/cadence-state.mjs advance content-out/manifest.json "${{ steps.plan.outputs.slot }}" "${{ steps.plan.outputs.today }}"

      - name: Post to Instagram
        if: steps.plan.outputs.post == 'true'
        env:
          IG_USER_ID_SOCCER: ${{ secrets.IG_USER_ID_SOCCER }}
          IG_ACCESS_TOKEN_SOCCER: ${{ secrets.IG_ACCESS_TOKEN_SOCCER }}
          IG_USER_ID_GOLF: ${{ secrets.IG_USER_ID_GOLF }}
          IG_ACCESS_TOKEN_GOLF: ${{ secrets.IG_ACCESS_TOKEN_GOLF }}
        run: node scripts/ig-post.mjs content-out "https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.host.outputs.sha }}/content-out"
