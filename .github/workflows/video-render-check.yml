name: Video render check

# Proves the app's WebCodecs MP4 export works in a GitHub Actions runner (the
# gating unknown for hands-off auto-posting). Renders ONE match headlessly and
# validates the MP4 with ffprobe. Publishes NOTHING.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/video-render-check.yml'
      - 'scripts/headless-export.mjs'
      - 'src/headless/exportOne.ts'
      - 'headless.html'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps + Chromium
        run: |
          npm ci
          npm i -D playwright
          npx playwright install --with-deps chromium

      - name: Render one match headlessly
        run: node scripts/headless-export.mjs

      - name: Validate the MP4
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          test -s headless-export.mp4 || { echo "❌ no MP4 produced"; exit 1; }
          echo "size: $(stat -c%s headless-export.mp4) bytes"
          ffprobe -v error -show_entries stream=codec_name,codec_type,width,height -show_entries format=duration -of default=noprint_wrappers=1 headless-export.mp4
          echo "✅ MP4 rendered + valid in the cloud"
