name: Video render check

# Proves the app's WebCodecs MP4 export works in a GitHub Actions runner (the
# gating unknown for hands-off auto-posting). Renders ONE match headlessly and
# validates the MP4 with ffprobe. Publishes NOTHING.

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/video-render-check.yml'
      - 'scripts/headless-export.mjs'
      - 'src/headless/exportOne.ts'
      - 'headless.html'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps + Chromium
        run: |
          npm ci
          npm i -D playwright
          npx playwright install --with-deps chromium

      - name: Render one match (video-only MP4 + WAV) headlessly
        run: node scripts/headless-export.mjs

      - name: Mux audio with ffmpeg + validate
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          test -s headless-export.mp4 || { echo "❌ no video MP4"; exit 1; }
          test -s headless-export.wav || { echo "❌ no WAV"; exit 1; }
          ffmpeg -y -i headless-export.mp4 -i headless-export.wav -c:v copy -c:a aac -b:a 128k -shortest headless-final.mp4
          echo "final size: $(stat -c%s headless-final.mp4) bytes"
          ffprobe -v error -show_entries stream=codec_name,codec_type,width,height -show_entries format=duration -of default=noprint_wrappers=1 headless-final.mp4
          types=$(ffprobe -v error -show_entries stream=codec_type -of default=nokey=1:noprint_wrappers=1 headless-final.mp4 | tr '\n' ' ')
          echo "streams: $types"
          echo "$types" | grep -q audio || { echo "❌ no audio stream"; exit 1; }
          echo "$types" | grep -q video || { echo "❌ no video stream"; exit 1; }
          echo "✅ video + AAC audio — rendered and muxed in the cloud"
